plugins {
    id 'java-gradle-plugin'
    id 'maven-publish'
}

group = 'dev.vfyjxf'
version = rootProject.findProperty('plugin_version')
        ?: rootProject.findProperty('mod_version')
        ?: '0.1'

def neoForgeModDevVersion = '2.0.140'
def neoForgeModDevJar = fileTree("${rootProject.projectDir}/.gradle-user-home/caches/modules-2/files-2.1/net.neoforged/moddev-gradle/${neoForgeModDevVersion}") {
    include '**/moddev-gradle-*.jar'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

gradlePlugin {
    plugins {
        modDevMcpHotswap {
            id = 'dev.vfyjxf.moddev-hotswap'
            implementationClass = 'dev.vfyjxf.mcp.gradle.ModDevMcpHotswapPlugin'
        }
    }
}

dependencies {
    compileOnly neoForgeModDevJar
    testImplementation gradleTestKit()
    testImplementation neoForgeModDevJar
    testImplementation 'org.junit.jupiter:junit-jupiter:5.12.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

publishing {
    repositories {
        mavenLocal()
    }
}
